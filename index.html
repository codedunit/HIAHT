<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="refresh" content="0; url=home.html">
	<title>Redirecting…</title>
	<link rel="canonical" href="home.html">
	<style>
		html,body{height:100%}body{display:flex;align-items:center;justify-content:center;font:14px/1.4 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#334}
		a{color:#06c;text-decoration:none}
	</style>
	<script>
		(function(){ var target='home.html'; if(location.pathname.endsWith('/')||location.pathname.endsWith('/index.html')) location.replace(target); })();
	</script>
	<!-- Fallback if meta refresh is blocked -->
</head>
<body>
	<div>Redirecting to <a href="home.html">home.html</a>…</div>
	<noscript><meta http-equiv="refresh" content="0; url=home.html"></noscript>
</body>
</html>
